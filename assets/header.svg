<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Ayman Abo El Ela - Mobile Application Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".5" stop-color="#111826"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>

    <linearGradient id="ink" x1="0" y1="0" x2="620" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset=".35" stop-color="#A371F7"/>
      <stop offset=".7" stop-color="#39D0D8"/>
      <stop offset="1" stop-color="#58A6FF"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-620 0; 620 0; -620 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="beam" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset=".5" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#A371F7" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" stroke="#1B2430" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity=".6"/>

  <g filter="url(#glow)" opacity=".5">
    <circle cx="250" cy="90" r="85" fill="#1F6FEB">
      <animate attributeName="cx" values="250;350;250" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="90;160;90" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="210" r="95" fill="#A371F7">
      <animate attributeName="cx" values="950;840;950" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="210;110;210" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="300" r="75" fill="#39D0D8" opacity=".8">
      <animate attributeName="cy" values="300;240;300" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="ui-monospace,SFMono-Regular,'JetBrains Mono','Fira Code',Menlo,Consolas,monospace">
    <text x="600" y="98" text-anchor="middle" font-size="17" letter-spacing="7" fill="#39D0D8" opacity=".85">
      &lt;flutter developer /&gt;
      <animate attributeName="opacity" values=".35;.9;.35" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="600" y="176" text-anchor="middle"
        font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-weight="800" font-size="64" letter-spacing="1" fill="url(#ink)">Ayman Abo El Ela</text>

  <rect x="905" y="140" width="6" height="46" rx="1" fill="#58A6FF">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="600" y="216" text-anchor="middle"
        font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="18" letter-spacing="2" fill="#8B949E">Mobile Application Developer &#160;·&#160; Clean Architecture &#160;·&#160; Bloc &#160;·&#160; IoT</text>

  <g fill="#30363D">
    <circle cx="556" cy="244" r="3.5"><animate attributeName="fill" values="#30363D;#58A6FF;#30363D" dur="2.4s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="578" cy="244" r="3.5"><animate attributeName="fill" values="#30363D;#A371F7;#30363D" dur="2.4s" begin=".3s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="244" r="3.5"><animate attributeName="fill" values="#30363D;#39D0D8;#30363D" dur="2.4s" begin=".6s" repeatCount="indefinite"/></circle>
    <circle cx="622" cy="244" r="3.5"><animate attributeName="fill" values="#30363D;#A371F7;#30363D" dur="2.4s" begin=".9s" repeatCount="indefinite"/></circle>
    <circle cx="644" cy="244" r="3.5"><animate attributeName="fill" values="#30363D;#58A6FF;#30363D" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
  </g>

  <rect x="0" y="277" width="1200" height="1" fill="#1F2733"/>
  <rect x="-240" y="275.5" width="240" height="3" rx="1.5" fill="url(#beam)">
    <animate attributeName="x" values="-240;1200" dur="4.5s" repeatCount="indefinite"/>
  </rect>
</svg>
